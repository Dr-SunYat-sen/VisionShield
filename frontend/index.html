<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionShield | 实时异动检测系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>VISION_SHIELD <span class="blink">_REC</span></h1>
        </header>
        
        <div class="control-panel">
            <h3>摄像头设置</h3>
            <div class="form-group">
                <label for="cameraType">摄像头类型:</label>
                <select id="cameraType">
                    <option value="local">本地摄像头</option>
                    <option value="ip">IP 摄像头</option>
                </select>
            </div>
            <div class="form-group" id="ipCameraConfig" style="display: none;">
                <label for="ipCameraUrl">IP 摄像头地址:</label>
                <input type="text" id="ipCameraUrl" placeholder="例如: http://192.168.1.100:8080/video">
            </div>
        </div>
        
        <main class="grid-layout">
            <section class="panel video-panel">
                <h2>CAMERA_FEED_01</h2>
                <div class="video-container">
                    <!-- 本地摄像头使用 video 元素 -->
                    <video id="webcam" autoplay playsinline style="display: block;"></video>
                    <!-- IP 摄像头使用 img 元素显示 base64 图片 -->
                    <img id="ip-camera-feed" style="display: none; width: 100%; height: 100%; object-fit: contain;">
                    <!-- 检测结果覆盖层 -->
                    <canvas id="overlay"></canvas>
                </div>
            </section>

            <section class="panel data-panel">
                <h2>SYS_METRICS</h2>
                <div id="log-output"></div>
                <button id="toggleStream" class="cyber-btn">INITIALIZE STREAM</button>
            </section>

            <section class="panel canvas-panel">
                <h2>SPATIAL_ANALYSIS</h2>
                <div id="vlm-status" class="vlm-status">🔄 VLM 初始化中...</div>
                <div id="vlm-output" class="vlm-output"></div>
                <div id="performance-metrics" class="performance-metrics"></div>
                <div id="3d-container"></div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script src="js/stream.js"></script>
    <script src="js/dashboard_3d.js"></script>

</body>
</html>
